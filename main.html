<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot Interface</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');

        @keyframes inputPulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.02);
            }
        }

        @keyframes rain {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 0 200px;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: url('./images/bg.png') center/cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.4);
            z-index: -1;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.93), rgba(255,255,255,0)),
                radial-gradient(2px 2px at 60px 70px, rgba(255,255,255,0.93), rgba(255,255,255,0)),
                radial-gradient(1px 1px at 50px 50px, rgba(255,255,255,0.93), rgba(255,255,255,0)),
                radial-gradient(1px 1px at 130px 80px, rgba(255,255,255,0.93), rgba(255,255,255,0)),
                radial-gradient(2px 2px at 90px 10px, rgba(255,255,255,0.93), rgba(255,255,255,0)),
                radial-gradient(1px 1px at 110px 150px, rgba(255,255,255,0.93), rgba(255,255,255,0)),
                radial-gradient(2px 2px at 40px 120px, rgba(255,255,255,0.93), rgba(255,255,255,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            background-position: 0 0;
            animation: rain 2.2s linear infinite;
            z-index: 1;
            pointer-events: none;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 775px;
            min-height: 118px;
            position: relative;
            z-index: 10;
        }

        .input-box {
            width: 725px;
            min-height: 118px;
            max-height: 500px;
            border-radius: 30px;
            background-color: rgba(255, 255, 255, 0.7);
            border: 1px solid #e5e7eb;
            box-shadow: 0 28px 972px 0px rgba(0, 0, 0, 1), 0 28px 1800px 0px rgba(0,0,0,0);
            padding: 12px;
            transition: all 0.42s ease;
            cursor: text;
            display: flex;
            flex-direction: column;
            animation: inputPulse 3s ease-in-out infinite;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .input-box::-webkit-scrollbar {
            display: none;
        }

        .input-box.paused {
            animation: none;
            transform: scale(1);
        }

        .input-box:hover {
            background-color: #f9fafb;
            box-shadow: 0 28px 650px 300px rgba(0,0,0,0.05), 0 28px 8750px 100px rgba(0,0,0,0.07);
            border-color: #d1d5db60;
        }

        .input-box:focus-within {
            background-color: #f9fafb;
            box-shadow: 0 28px 650px 300px rgba(0,0,0,0.15), 0 28px 8750px 100px rgba(0,0,0,0.05);
            border-color: #d1d5db;
            outline: none;
        }

        .input-area {
            display: flex;
            gap: 8px;
            flex: 1;
        }

        textarea {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 16px;
            font-family: inherit;
            color: #1f2937;
            resize: none;
            font-weight: 500;
            padding: 7px 4px 4px 9px;
            min-height: 40px;
            overflow: hidden;
        }

        textarea::placeholder {
            color: #9ca3af;
            margin-left: 5px;
        }

        .button-row {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            align-items: center;
            justify-content: space-between;
        }

        .thinking-button {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 20px;
            background-color: rgba(243, 244, 246, 0.55);
            border: 1px solid rgba(209, 213, 219, 0.5);
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            color: #374151;
            transition: all 0.2s ease;
            white-space: nowrap;
            margin-left: 3px;
        }

        .thinking-button:hover {
            background-color: #e5e7eb;
            border-color: #d1d5db;
        }

        .thinking-button:active {
            background-color: #d1d5db;
        }

        .thinking-button.active {
            background-color: #667eea;
            color: white;
            border-color: #667eea;
        }

        .send-button {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 14px;
            border-radius: 20px;
            background-color: rgba(243, 244, 246, 0.55);
            border: 1px solid rgba(209, 213, 219, 0.5);
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            color: #374151;
            transition: all 0.2s ease;
            white-space: nowrap;
            margin-left: auto;
        }

        .send-button:hover {
            background-color: #e5e7eb;
            border-color: #d1d5db;
        }

        .send-button:active {
            background-color: #d1d5db;
        }

        .sidebar {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 250px;
            height: calc(100vh - 160px);
            background: rgba(255, 255, 255, 0.7);
            transition: all 0.54s ease;
            z-index: 100;
            overflow: hidden;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }

        .sidebar.left {
            left: -250px;
            border-radius: 0 20px 20px 0;
        }

        .sidebar.right {
            right: -250px;
            left: auto;
            border-radius: 20px 0 0 20px;
            box-shadow: -2px 0 10px rgba(0,0,0,0.2);
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar.right.open {
            right: 0;
            left: auto;
        }

        .sidebar-content h3 {
            color: #1f2937;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .sidebar-content {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .sidebar-content ul {
            list-style: none;
            flex: 1;
            overflow-y: auto;
            margin-top: 15px;
            margin-bottom: 15px;
            margin-left: -10px;
            padding-left: 10px;
            padding-right: 5px;
            -ms-overflow-style: none;
            scrollbar-width: thin;
            scrollbar-color: #d1d5db #f3f4f6;
        }

        .sidebar-content ul::-webkit-scrollbar {
            width: 8px;
        }

        .sidebar-content ul::-webkit-scrollbar-track {
            background: #f3f4f6;
            border-radius: 10px;
            margin-left: 5px;
        }

        .sidebar-content ul::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 10px;
            transition: background 0.2s ease;
        }

        .sidebar-content ul::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }

        .sidebar-content ul::-webkit-scrollbar {
            display: none;
        }

        .scroll-arrow-btn {
            width: 100%;
            padding: 10px;
            margin-top: auto;
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            cursor: pointer;
            color: #374151;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .scroll-arrow-btn:hover {
            background-color: #e5e7eb;
            border-color: #d1d5db;
        }

        .scroll-arrow-btn:active {
            background-color: #d1d5db;
        }

        .sidebar-content li {
            margin-bottom: 12px;
        }

        .sidebar-content a {
            color: #374151;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s ease;
        }

        .sidebar-content a:hover {
            color: #1f2937;
        }

        .helper-text {
            margin-top: 35px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .vertical-bar {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            z-index: 99;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
        }

        .vertical-bar-item {
            width: 25px;
            height: 25px;
            background: transparent;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            border: none;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .vertical-bar-item:hover {
            background: #e5e7eb;
            border-color: #d1d5db;
        }

        .vertical-bar-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 6px;
        }

        .nav-btn {
            padding: 10px 20px;
            border: none;
            background: none;
            color: #374151;
            cursor: pointer;
            font-size: 16px; /* Set consistent text size */
            font-weight: 100; /* Ultra thin font */
            color: white; /* Set button text color to white */
            font-family: 'Inter', sans-serif;
            text-decoration: none;
            display: inline-block;
        }

        .nav-btn.active {
            color: white; /* Remove highlighting for active button */
            background: none; /* Remove background color for active button */
        }

        .nav-btn:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="helper-text" style="text-align: center; color: #fff; font-size: 28px; font-weight: 500; margin-bottom: 30px; margin-top: 0; width: 100%; display: block; position: relative; z-index: 10;">
            How may I help you today?
        </div>
        <div class="input-box">
            <div class="input-area">
                <textarea placeholder="How may I help you today?"></textarea>
            </div>
            <div class="button-row">
                <button id="deepthink-btn" class="thinking-button" title="Activate Deepthink Mode">
                    <svg height="14px" style="flex:none;line-height:1" viewBox="0 0 24 24" width="14px" xmlns="http://www.w3.org/2000/svg"><path d="M23.748 4.482c-.254-.124-.364.113-.512.234-.051.039-.094.09-.137.136-.372.397-.806.657-1.373.626-.829-.046-1.537.214-2.163.848-.133-.782-.575-1.248-1.247-1.548-.352-.156-.708-.311-.955-.65-.172-.241-.219-.51-.305-.774-.055-.16-.11-.323-.293-.35-.2-.031-.278.136-.356.276-.313.572-.434 1.202-.422 1.84.027 1.436.633 2.58 1.838 3.393.137.093.172.187.129.323-.082.28-.18.552-.266.833-.055.179-.137.217-.329.14a5.526 5.526 0 01-1.736-1.18c-.857-.828-1.631-1.742-2.597-2.458a11.365 11.365 0 00-.689-.471c-.985-.957.13-1.743.388-1.836.27-.098.093-.432-.779-.428-.872.004-1.67.295-2.687.684a3.055 3.055 0 01-.465.137 9.597 9.597 0 00-2.883-.102c-1.885.21-3.39 1.102-4.497 2.623C.082 8.606-.231 10.684.152 12.85c.403 2.284 1.569 4.175 3.36 5.653 1.858 1.533 3.997 2.284 6.438 2.14 1.482-.085 3.133-.284 4.994-1.86.47.234.962.327 1.78.397.63.059 1.236-.03 1.705-.128.735-.156.684-.837.419-.961-2.155-1.004-1.682-.595-2.113-.926 1.096-1.296 2.746-2.642 3.392-7.003.05-.347.007-.565 0-.845-.004-.17.035-.237.23-.256a4.173 4.173 0 001.545-.475c1.396-.763 1.96-2.015 2.093-3.517.02-.23-.004-.467-.247-.588zM11.581 18c-2.089-1.642-3.102-2.183-3.52-2.16-.392.024-.321.471-.235.763.09.288.207.486.371.739.114.167.192.416-.113.603-.673.416-1.842-.14-1.897-.167-1.361-.802-2.5-1.86-3.301-3.307-.774-1.393-1.224-2.887-1.298-4.482-.02-.386.093-.522.477-.592a4.696 4.696 0 011.529-.039c2.132.312 3.946 1.265 5.468 2.774.868.86 1.525 1.887 2.202 2.891.72 1.066 1.494 2.082 2.48 2.914.348.292.625.514.891.677-.802.09-2.14.11-3.054-.614zm1-6.44a.306.306 0 01.415-.287.302.302 0 01.2.288.306.306 0 01-.31.307.303.303 0 01-.304-.308zm3.11 1.596c-.2.081-.399.151-.59.16a1.245 1.245 0 01-.798-.254c-.274-.23-.47-.358-.552-.758a1.73 1.73 0 01.016-.588c.07-.327-.008-.537-.239-.727-.187-.156-.426-.199-.688-.199a.559.559 0 01-.254-.078c-.11-.054-.2-.19-.114-.358.028-.054.16-.186.19                     <span>Deepthink</span>
                </button>
                <button id="send-btn" class="send-button" title="Send message">Send</button>
            </div>
        </div>
    </div>

    <div id="sidebar-left" class="sidebar left">
        <div class="sidebar-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="margin-bottom: 0;">Chat History</h3>
                <button id="test-btn" style="padding: 4px 8px; font-size: 12px; background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 6px; cursor: pointer; color: #374151; font-weight: 500; transition: all 0.2s ease;" title="Test populate chat history">Test</button>
            </div>
            <ul id="chat-history-list">
                <!-- Chat history items will be populated here -->
            </ul>
        </div>
    </div>

    <div id="sidebar-right" class="sidebar right">
        <div class="sidebar-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="margin-bottom: 0;">Settings</h3>
            </div>
            <ul id="settings-list" style="list-style: none;">
                <!-- Settings items will be populated here -->
                <li style="margin-bottom: 12px;"><button style="width: 100%; padding: 10px; background: rgba(243, 244, 246, 0.55); border: none; border-radius: 8px; cursor: pointer; color: #374151; font-weight: 500; font-size: 13px; transition: all 0.2s ease;" title="Theme settings">Dark Mode</button></li>
                <li style="margin-bottom: 12px;"><button style="width: 100%; padding: 10px; background: rgba(243, 244, 246, 0.55); border: none; border-radius: 8px; cursor: pointer; color: #374151; font-weight: 500; font-size: 13px; transition: all 0.2s ease;" title="Preferences">Preferences</button></li>
            </ul>
        </div>
    </div>

    <div id="vertical-bar" class="vertical-bar" title="Right Preview">
        <div class="vertical-bar-item" data-section="settings" title="Settings"><img src="adjustments.png" alt="Settings" style="width: 100%; height: 100%; object-fit: contain;"></div>
    </div>

    <script>
        const API_KEY = 'sk-b644c4de9b4e4281a886a7777a921105';
        let deepthinkMode = false;

        const sidebarLeft = document.getElementById('sidebar-left');
        const sidebarRight = document.getElementById('sidebar-right');
        const triggerZone = 100;
        let lastTriggerStateLeft = false;
        let lastTriggerStateRight = false;
        let sidebarLeftClickedOpen = false;
        let sidebarCooldown = false;
        let debounceTimer;

        const deepthinkBtn = document.getElementById('deepthink-btn');
        const sendBtn = document.getElementById('send-btn');
        const textarea = document.querySelector('textarea');

        deepthinkBtn.addEventListener('click', () => {
            deepthinkMode = !deepthinkMode;
            deepthinkBtn.classList.toggle('active', deepthinkMode);
        });

        sendBtn.addEventListener('click', () => {
            const message = textarea.value.trim();
            if (message) {
                const model = deepthinkMode ? 'deepseek-reasoner' : 'deepseek-chat';
                
                // Save pending message to sessionStorage to load on chatbot.html
                sessionStorage.setItem('pendingMessage', JSON.stringify({
                    content: message,
                    model: model,
                    timestamp: new Date().toISOString()
                }));
                
                textarea.value = '';
                textarea.style.height = 'auto';
                // Reset button state
                inputBox.classList.remove('paused');
                
                // Redirect to chatbot.html
                window.location.href = 'chatbot.html';
            }
        });

        textarea.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
        });

        function handleMouseMove(e) {
            clearTimeout(debounceTimer);
            
            debounceTimer = setTimeout(() => {
                // Left trigger zone - only if not manually opened and not in cooldown
                if (!sidebarLeftClickedOpen && !sidebarCooldown) {
                    if (e.clientX < triggerZone) {
                        if (!lastTriggerStateLeft) {
                            sidebarLeft.classList.add('open');
                            lastTriggerStateLeft = true;
                        }
                    } else {
                        if (!sidebarLeft.contains(e.target)) {
                            sidebarLeft.classList.remove('open');
                            lastTriggerStateLeft = false;
                        }
                    }
                }
            }, 50);
        }

        document.addEventListener('mousemove', handleMouseMove);

        sidebarLeft.addEventListener('mouseenter', () => {
            clearTimeout(debounceTimer);
            lastTriggerStateLeft = true;
        });

        sidebarLeft.addEventListener('mouseleave', () => {
            if (!sidebarLeftClickedOpen) {
                lastTriggerStateLeft = false;
            }
        });

        sidebarLeft.addEventListener('click', (e) => {
            // Only keep open if clicking on non-button parts of the interface
            if (e.target.tagName !== 'BUTTON' && !e.target.closest('button')) {
                sidebarLeftClickedOpen = true;
            }
        });

        // Close left sidebar when clicking outside
        document.addEventListener('click', (e) => {
            if (sidebarLeftClickedOpen) {
                // If manually opened, only close if clicking outside the sidebar
                if (!sidebarLeft.contains(e.target)) {
                    sidebarLeft.classList.remove('open');
                    sidebarLeftClickedOpen = false;
                }
            } else {
                // If hover-opened, close normally
                if (!sidebarLeft.contains(e.target) && e.clientX >= triggerZone) {
                    sidebarLeft.classList.remove('open');
                    lastTriggerStateLeft = false;
                }
            }
        });

        sidebarRight.addEventListener('mouseenter', () => {
            clearTimeout(debounceTimer);
            lastTriggerStateRight = true;
        });

        sidebarRight.addEventListener('mouseleave', () => {
            lastTriggerStateRight = false;
        });

        const testBtn = document.getElementById('test-btn');
        const chatHistoryList = document.getElementById('chat-history-list');

        testBtn.addEventListener('click', () => {
            const li = document.createElement('li');
            li.style.marginBottom = '8px';
            const btn = document.createElement('button');
            btn.textContent = '[test]';
            btn.style.width = '100%';
            btn.style.padding = '10px';
            btn.style.textAlign = 'left';
            btn.style.backgroundColor = 'rgba(243, 244, 246, 0.55)';
            btn.style.border = 'none';
            btn.style.borderRadius = '8px';
            btn.style.fontSize = '13px';
            btn.style.color = '#374151';
            btn.style.cursor = 'pointer';
            btn.style.transition = 'all 0.2s ease';
            btn.style.fontFamily = 'inherit';
            btn.style.fontWeight = '500';
            btn.addEventListener('mouseenter', () => {
                btn.style.backgroundColor = 'rgba(229, 231, 235, 0.55)';
            });
            btn.addEventListener('mouseleave', () => {
                btn.style.backgroundColor = 'rgba(243, 244, 246, 0.55)';
                btn.style.borderColor = '#e5e7eb';
            });
            btn.addEventListener('click', () => {
                console.log('Chat selected: [test]');
                // Close sidebar when a chat is selected
                sidebarLeft.classList.remove('open');
                sidebarLeftClickedOpen = false;
                lastTriggerStateLeft = false;
                // Set cooldown to prevent immediate reopening
                sidebarCooldown = true;
                setTimeout(() => { sidebarCooldown = false; }, 500);
            });
            li.appendChild(btn);
            chatHistoryList.appendChild(li);
        });

        // Input box pulse control
        const inputBox = document.querySelector('.input-box');

        textarea.addEventListener('focus', () => {
            inputBox.classList.add('paused');
        });

        textarea.addEventListener('blur', () => {
            inputBox.classList.remove('paused');
        });

        // Auto-resize textarea as user types
        textarea.addEventListener('input', () => {
            textarea.style.height = 'auto';
            const newHeight = textarea.scrollHeight;
            textarea.style.height = newHeight + 'px';
        });

        // Vertical bar functionality
        const verticalBarItems = document.querySelectorAll('.vertical-bar-item');
        const verticalBar = document.getElementById('vertical-bar');

        verticalBarItems.forEach(item => {
            item.addEventListener('click', (e) => {
                sidebarRight.classList.toggle('open');
            });
        });

        // Close sidebar when clicking outside
        document.addEventListener('click', (e) => {
            if (!sidebarRight.contains(e.target) && !verticalBar.contains(e.target)) {
                sidebarRight.classList.remove('open');
            }
        });
    </script>
</body>
</html>
